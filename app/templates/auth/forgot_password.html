{% extends 'base.html' %}
{% block title %}Forgot Password - Python Learning Tool{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-3">
                    <i class="bi bi-key"></i> Forgot Password
                </h2>
                <p class="text-muted text-center mb-4">
                    Enter the email address associated with your account and we'll send you a link to reset your password.
                </p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email"
                               required autofocus placeholder="Enter your email address">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-envelope me-1"></i> Send Reset Link
                    </button>
                </form>
                <p class="text-center text-muted mb-0">
                    <a href="{{ url_for('auth.login') }}"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
