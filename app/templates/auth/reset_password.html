{% extends 'base.html' %}
{% block title %}Reset Password - Python Learning Tool{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-3">
                    <i class="bi bi-shield-lock"></i> Reset Password
                </h2>
                <p class="text-muted text-center mb-4">
                    Enter your new password below.
                </p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="password" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="password" name="password"
                               required autofocus placeholder="At least 8 characters">
                        <div class="form-text">Must be at least 8 characters with a letter and a number.</div>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                               required placeholder="Re-enter your new password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-check-lg me-1"></i> Reset Password
                    </button>
                </form>
                <p class="text-center text-muted mb-0">
                    <a href="{{ url_for('auth.login') }}"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
