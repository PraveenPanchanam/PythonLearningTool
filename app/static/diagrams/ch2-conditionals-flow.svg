<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" width="680" height="480" style="background:transparent">
  <style>
    text { font-family: 'Segoe Print', 'Comic Sans MS', 'Caveat', cursive; }
    .title { font-size: 20px; font-weight: bold; fill: #1e1e1e; }
    .label { font-size: 15px; fill: #1e1e1e; }
    .code { font-family: 'Courier New', monospace; font-size: 13px; fill: #1e1e1e; }
    .yn { font-size: 14px; font-weight: bold; }
    .yes { fill: #2f9e44; }
    .no { fill: #e03131; }
    .small { font-size: 12px; fill: #666; }
    rect.action { fill: #d0ebff; stroke: #1971c2; stroke-width: 2; rx: 8; }
    rect.start { fill: #b2f2bb; stroke: #2f9e44; stroke-width: 2; rx: 20; }
    polygon.decision { fill: #fff3bf; stroke: #e8590c; stroke-width: 2; }
    line.flow, path.flow { stroke: #495057; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
  </style>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" class="title">if / elif / else Flowchart</text>

  <!-- Start -->
  <rect class="start" x="260" y="45" width="160" height="40"/>
  <text x="340" y="70" text-anchor="middle" class="label">Start</text>
  <line class="flow" x1="340" y1="85" x2="340" y2="115"/>

  <!-- Decision 1: score >= 90 -->
  <polygon class="decision" points="340,118 480,168 340,218 200,168"/>
  <text x="340" y="164" text-anchor="middle" class="code">score >= 90?</text>

  <!-- Yes -> A -->
  <line class="flow" x1="480" y1="168" x2="570" y2="168"/>
  <text x="500" y="160" class="yn yes">Yes</text>
  <rect class="action" x="570" y="148" width="100" height="40"/>
  <text x="620" y="172" text-anchor="middle" class="code">print("A")</text>

  <!-- No -> Decision 2 -->
  <line class="flow" x1="340" y1="218" x2="340" y2="248"/>
  <text x="352" y="240" class="yn no">No</text>

  <!-- Decision 2: score >= 80 -->
  <polygon class="decision" points="340,250 480,300 340,350 200,300"/>
  <text x="340" y="296" text-anchor="middle" class="code">score >= 80?</text>

  <!-- Yes -> B -->
  <line class="flow" x1="480" y1="300" x2="570" y2="300"/>
  <text x="500" y="292" class="yn yes">Yes</text>
  <rect class="action" x="570" y="280" width="100" height="40"/>
  <text x="620" y="304" text-anchor="middle" class="code">print("B")</text>

  <!-- No -> else -->
  <line class="flow" x1="340" y1="350" x2="340" y2="390"/>
  <text x="352" y="375" class="yn no">No</text>

  <!-- Else block -->
  <rect class="action" x="270" y="392" width="140" height="40"/>
  <text x="340" y="416" text-anchor="middle" class="code">print("C")</text>

  <!-- Labels -->
  <text x="60" y="168" class="small">if</text>
  <text x="60" y="300" class="small">elif</text>
  <text x="60" y="412" class="small">else</text>
  <rect x="48" y="155" width="30" height="20" rx="4" fill="none" stroke="#868e96" stroke-width="1" stroke-dasharray="4 2"/>
  <rect x="48" y="287" width="38" height="20" rx="4" fill="none" stroke="#868e96" stroke-width="1" stroke-dasharray="4 2"/>
  <rect x="48" y="399" width="34" height="20" rx="4" fill="none" stroke="#868e96" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- End -->
  <text x="340" y="468" text-anchor="middle" class="small">Each condition is checked in order; first True wins</text>
</svg>
