<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 380" width="740" height="380" style="background:transparent">
  <style>
    text { font-family: 'Segoe Print', 'Comic Sans MS', 'Caveat', cursive; }
    .title { font-size: 20px; font-weight: bold; fill: #1e1e1e; }
    .subtitle { font-size: 15px; font-weight: bold; fill: #495057; }
    .label { font-size: 13px; fill: #1e1e1e; }
    .code { font-family: 'Courier New', monospace; font-size: 12px; fill: #1e1e1e; }
    .val { font-family: 'Courier New', monospace; font-size: 14px; fill: #1e1e1e; }
    .small { font-size: 12px; fill: #666; }
    .dim { font-size: 13px; font-weight: bold; fill: #e03131; }
    rect.cell { fill: #d0ebff; stroke: #1971c2; stroke-width: 1.5; rx: 3; }
    rect.cell3d { fill: #d3f9d8; stroke: #2f9e44; stroke-width: 1.5; rx: 3; }
    rect.cell3d-back { fill: #e8d0ff; stroke: #7950f2; stroke-width: 1.5; rx: 3; }
  </style>

  <text x="370" y="28" text-anchor="middle" class="title">NumPy Array Shapes: 1D, 2D, and 3D</text>

  <!-- 1D Array -->
  <text x="120" y="68" text-anchor="middle" class="subtitle">1D Array</text>
  <text x="120" y="88" text-anchor="middle" class="code">shape = (5,)</text>

  <rect class="cell" x="20" y="100" width="44" height="40"/>
  <rect class="cell" x="66" y="100" width="44" height="40"/>
  <rect class="cell" x="112" y="100" width="44" height="40"/>
  <rect class="cell" x="158" y="100" width="44" height="40"/>
  <rect class="cell" x="204" y="100" width="44" height="40"/>
  <text x="42" y="125" text-anchor="middle" class="val">1</text>
  <text x="88" y="125" text-anchor="middle" class="val">2</text>
  <text x="134" y="125" text-anchor="middle" class="val">3</text>
  <text x="180" y="125" text-anchor="middle" class="val">4</text>
  <text x="226" y="125" text-anchor="middle" class="val">5</text>

  <!-- Dimension arrow -->
  <line x1="20" y1="152" x2="248" y2="152" stroke="#e03131" stroke-width="2" marker-end="url(#arrN)"/>
  <text x="134" y="168" text-anchor="middle" class="dim">axis 0 (5 elements)</text>

  <!-- 2D Array -->
  <text x="120" y="210" text-anchor="middle" class="subtitle">2D Array</text>
  <text x="120" y="230" text-anchor="middle" class="code">shape = (3, 4)</text>

  <!-- Row 0 -->
  <rect class="cell" x="20" y="240" width="44" height="32"/>
  <rect class="cell" x="66" y="240" width="44" height="32"/>
  <rect class="cell" x="112" y="240" width="44" height="32"/>
  <rect class="cell" x="158" y="240" width="44" height="32"/>
  <!-- Row 1 -->
  <rect class="cell" x="20" y="274" width="44" height="32"/>
  <rect class="cell" x="66" y="274" width="44" height="32"/>
  <rect class="cell" x="112" y="274" width="44" height="32"/>
  <rect class="cell" x="158" y="274" width="44" height="32"/>
  <!-- Row 2 -->
  <rect class="cell" x="20" y="308" width="44" height="32"/>
  <rect class="cell" x="66" y="308" width="44" height="32"/>
  <rect class="cell" x="112" y="308" width="44" height="32"/>
  <rect class="cell" x="158" y="308" width="44" height="32"/>

  <text x="42" y="261" text-anchor="middle" class="val">1</text>
  <text x="88" y="261" text-anchor="middle" class="val">2</text>
  <text x="134" y="261" text-anchor="middle" class="val">3</text>
  <text x="180" y="261" text-anchor="middle" class="val">4</text>
  <text x="42" y="295" text-anchor="middle" class="val">5</text>
  <text x="88" y="295" text-anchor="middle" class="val">6</text>
  <text x="134" y="295" text-anchor="middle" class="val">7</text>
  <text x="180" y="295" text-anchor="middle" class="val">8</text>
  <text x="42" y="329" text-anchor="middle" class="val">9</text>
  <text x="88" y="329" text-anchor="middle" class="val">10</text>
  <text x="134" y="329" text-anchor="middle" class="val">11</text>
  <text x="180" y="329" text-anchor="middle" class="val">12</text>

  <!-- Axis labels for 2D -->
  <text x="8" y="290" text-anchor="middle" class="dim" transform="rotate(-90, 8, 290)">axis 0 (rows)</text>
  <line x1="20" y1="348" x2="202" y2="348" stroke="#e03131" stroke-width="2" marker-end="url(#arrN)"/>
  <text x="111" y="365" text-anchor="middle" class="dim">axis 1 (cols)</text>

  <!-- 3D Array -->
  <text x="520" y="68" text-anchor="middle" class="subtitle">3D Array</text>
  <text x="520" y="88" text-anchor="middle" class="code">shape = (2, 3, 4)</text>

  <!-- Back layer (depth 1) -->
  <rect class="cell3d-back" x="420" y="98" width="36" height="28"/>
  <rect class="cell3d-back" x="458" y="98" width="36" height="28"/>
  <rect class="cell3d-back" x="496" y="98" width="36" height="28"/>
  <rect class="cell3d-back" x="534" y="98" width="36" height="28"/>
  <rect class="cell3d-back" x="420" y="128" width="36" height="28"/>
  <rect class="cell3d-back" x="458" y="128" width="36" height="28"/>
  <rect class="cell3d-back" x="496" y="128" width="36" height="28"/>
  <rect class="cell3d-back" x="534" y="128" width="36" height="28"/>
  <rect class="cell3d-back" x="420" y="158" width="36" height="28"/>
  <rect class="cell3d-back" x="458" y="158" width="36" height="28"/>
  <rect class="cell3d-back" x="496" y="158" width="36" height="28"/>
  <rect class="cell3d-back" x="534" y="158" width="36" height="28"/>

  <!-- Front layer (depth 0) — offset -->
  <rect class="cell3d" x="400" y="118" width="36" height="28"/>
  <rect class="cell3d" x="438" y="118" width="36" height="28"/>
  <rect class="cell3d" x="476" y="118" width="36" height="28"/>
  <rect class="cell3d" x="514" y="118" width="36" height="28"/>
  <rect class="cell3d" x="400" y="148" width="36" height="28"/>
  <rect class="cell3d" x="438" y="148" width="36" height="28"/>
  <rect class="cell3d" x="476" y="148" width="36" height="28"/>
  <rect class="cell3d" x="514" y="148" width="36" height="28"/>
  <rect class="cell3d" x="400" y="178" width="36" height="28"/>
  <rect class="cell3d" x="438" y="178" width="36" height="28"/>
  <rect class="cell3d" x="476" y="178" width="36" height="28"/>
  <rect class="cell3d" x="514" y="178" width="36" height="28"/>

  <!-- Axis labels for 3D -->
  <text x="480" y="230" text-anchor="middle" class="dim">axis 2 (cols)</text>
  <text x="380" y="165" text-anchor="middle" class="dim" transform="rotate(-90, 380, 165)">axis 1</text>
  <line x1="570" y1="102" x2="555" y2="118" stroke="#e03131" stroke-width="2"/>
  <text x="610" y="105" class="dim">axis 0 (depth)</text>

  <!-- Analogy -->
  <text x="520" y="268" text-anchor="middle" class="small">Think of 3D as a stack of 2D tables</text>
  <text x="520" y="288" text-anchor="middle" class="small">(like pages in a book)</text>

  <!-- Footer -->
  <text x="370" y="370" text-anchor="middle" class="small">Shape tells you the size along each dimension: (depth, rows, columns)</text>

  <defs>
    <marker id="arrN" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e03131"/>
    </marker>
  </defs>
</svg>
