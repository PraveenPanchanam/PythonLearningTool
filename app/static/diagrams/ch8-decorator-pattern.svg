<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380" style="background:transparent">
  <style>
    text { font-family: 'Segoe Print', 'Comic Sans MS', 'Caveat', cursive; }
    .title { font-size: 20px; font-weight: bold; fill: #1e1e1e; }
    .label { font-size: 14px; fill: #1e1e1e; }
    .code { font-family: 'Courier New', monospace; font-size: 12px; fill: #1e1e1e; }
    .small { font-size: 12px; fill: #666; }
    .step { font-size: 13px; font-weight: bold; fill: #e03131; }
    rect.outer { fill: #fff3bf; stroke: #e8590c; stroke-width: 2; rx: 10; }
    rect.inner { fill: #d0ebff; stroke: #1971c2; stroke-width: 2; rx: 8; }
    rect.core { fill: #d3f9d8; stroke: #2f9e44; stroke-width: 2; rx: 6; }
    line.arrow { stroke: #495057; stroke-width: 2; fill: none; marker-end: url(#arr8); }
    path.arrow { stroke: #495057; stroke-width: 2; fill: none; marker-end: url(#arr8); }
    .num { font-size: 16px; font-weight: bold; fill: white; }
    circle.step-circle { fill: #e03131; }
  </style>
  <defs>
    <marker id="arr8" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057"/>
    </marker>
  </defs>

  <text x="350" y="28" text-anchor="middle" class="title">How Decorators Work</text>

  <!-- Nested boxes showing wrapping -->
  <rect class="outer" x="120" y="50" width="460" height="200"/>
  <text x="350" y="74" text-anchor="middle" class="label">@timer decorator (wrapper)</text>
  <text x="140" y="94" class="code">start = time.time()</text>

  <rect class="inner" x="170" y="104" width="360" height="90"/>
  <text x="350" y="130" text-anchor="middle" class="label">Original Function</text>
  <rect class="core" x="220" y="140" width="260" height="40"/>
  <text x="350" y="164" text-anchor="middle" class="code">def process_data(data):</text>

  <text x="140" y="232" class="code">elapsed = time.time() - start</text>

  <!-- Flow with numbered steps -->
  <!-- Step 1: Call comes in -->
  <circle class="step-circle" cx="55" cy="150" r="14"/>
  <text x="55" y="155" text-anchor="middle" class="num">1</text>
  <line class="arrow" x1="69" y1="150" x2="115" y2="150"/>
  <text x="55" y="130" text-anchor="middle" class="step">Call</text>

  <!-- Step 2: Pre-processing -->
  <circle class="step-circle" cx="145" cy="82" r="14"/>
  <text x="145" y="87" text-anchor="middle" class="num">2</text>
  <text x="255" y="94" class="small">Before: record start time</text>

  <!-- Step 3: Original runs -->
  <circle class="step-circle" cx="196" cy="160" r="14"/>
  <text x="196" y="165" text-anchor="middle" class="num">3</text>

  <!-- Step 4: Post-processing -->
  <circle class="step-circle" cx="145" cy="232" r="14"/>
  <text x="145" y="237" text-anchor="middle" class="num">4</text>
  <text x="400" y="232" class="small">After: calculate elapsed time</text>

  <!-- Step 5: Return -->
  <circle class="step-circle" cx="645" cy="150" r="14"/>
  <text x="645" y="155" text-anchor="middle" class="num">5</text>
  <line class="arrow" x1="580" y1="150" x2="631" y2="150"/>
  <text x="645" y="130" text-anchor="middle" class="step">Return</text>

  <!-- Code example at bottom -->
  <text x="100" y="285" class="code">@timer</text>
  <text x="100" y="303" class="code">def process_data(data):</text>
  <text x="100" y="321" class="code">    # ... do work ...</text>
  <text x="100" y="339" class="code">    return result</text>

  <text x="420" y="295" class="small">The @decorator syntax is syntactic sugar for:</text>
  <text x="420" y="315" class="code">process_data = timer(process_data)</text>

  <text x="350" y="372" text-anchor="middle" class="small">A decorator wraps a function, adding behavior before and/or after the original runs</text>
</svg>
