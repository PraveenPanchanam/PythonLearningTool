<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 440" width="740" height="440" style="background:transparent">
  <style>
    text { font-family: 'Segoe Print', 'Comic Sans MS', 'Caveat', cursive; }
    .title { font-size: 20px; font-weight: bold; fill: #1e1e1e; }
    .struct-title { font-size: 16px; font-weight: bold; fill: #1e1e1e; }
    .label { font-size: 13px; fill: #1e1e1e; }
    .code { font-family: 'Courier New', monospace; font-size: 12px; fill: #1e1e1e; }
    .small { font-size: 11px; fill: #666; }
    .prop { font-size: 12px; fill: #495057; }
    .idx { font-size: 11px; fill: #868e96; }
    rect.cell { stroke: #1e1e1e; stroke-width: 1.5; rx: 4; }
    rect.list-cell { fill: #d0ebff; }
    rect.tuple-cell { fill: #d3f9d8; }
    rect.dict-key { fill: #fff3bf; }
    rect.dict-val { fill: #d0ebff; }
    rect.set-cell { fill: #e8d0ff; }
    .bracket { font-size: 28px; fill: #495057; font-family: 'Courier New', monospace; }
  </style>

  <text x="370" y="28" text-anchor="middle" class="title">Python Data Structures Comparison</text>

  <!-- LIST -->
  <text x="45" y="72" class="struct-title">List [ ]</text>
  <text x="45" y="90" class="prop">Ordered, Mutable, Allows Duplicates</text>
  <text x="22" y="128" class="idx">0</text>
  <text x="82" y="128" class="idx">1</text>
  <text x="142" y="128" class="idx">2</text>
  <text x="202" y="128" class="idx">3</text>
  <rect class="cell list-cell" x="10" y="132" width="56" height="36"/>
  <rect class="cell list-cell" x="70" y="132" width="56" height="36"/>
  <rect class="cell list-cell" x="130" y="132" width="56" height="36"/>
  <rect class="cell list-cell" x="190" y="132" width="56" height="36"/>
  <text x="38" y="155" text-anchor="middle" class="code">"a"</text>
  <text x="98" y="155" text-anchor="middle" class="code">"b"</text>
  <text x="158" y="155" text-anchor="middle" class="code">"c"</text>
  <text x="218" y="155" text-anchor="middle" class="code">"a"</text>
  <text x="45" y="186" class="small">fruits = ["a", "b", "c", "a"]</text>

  <!-- TUPLE -->
  <text x="410" y="72" class="struct-title">Tuple ( )</text>
  <text x="410" y="90" class="prop">Ordered, Immutable, Allows Duplicates</text>
  <text x="392" y="128" class="idx">0</text>
  <text x="452" y="128" class="idx">1</text>
  <text x="512" y="128" class="idx">2</text>
  <rect class="cell tuple-cell" x="380" y="132" width="56" height="36"/>
  <rect class="cell tuple-cell" x="440" y="132" width="56" height="36"/>
  <rect class="cell tuple-cell" x="500" y="132" width="56" height="36"/>
  <text x="408" y="155" text-anchor="middle" class="code">10</text>
  <text x="468" y="155" text-anchor="middle" class="code">20</text>
  <text x="528" y="155" text-anchor="middle" class="code">30</text>
  <!-- Lock icon for immutable -->
  <text x="570" y="155" class="label">&#128274;</text>
  <text x="410" y="186" class="small">point = (10, 20, 30)</text>

  <!-- DICTIONARY -->
  <text x="45" y="230" class="struct-title">Dict { key: value }</text>
  <text x="45" y="248" class="prop">Ordered (3.7+), Mutable, Unique Keys</text>
  <rect class="cell dict-key" x="10" y="260" width="70" height="36"/>
  <rect class="cell dict-val" x="82" y="260" width="70" height="36"/>
  <text x="45" y="283" text-anchor="middle" class="code">"name"</text>
  <text x="117" y="283" text-anchor="middle" class="code">"Ali"</text>

  <rect class="cell dict-key" x="10" y="300" width="70" height="36"/>
  <rect class="cell dict-val" x="82" y="300" width="70" height="36"/>
  <text x="45" y="323" text-anchor="middle" class="code">"age"</text>
  <text x="117" y="323" text-anchor="middle" class="code">25</text>

  <rect class="cell dict-key" x="10" y="340" width="70" height="36"/>
  <rect class="cell dict-val" x="82" y="340" width="70" height="36"/>
  <text x="45" y="363" text-anchor="middle" class="code">"city"</text>
  <text x="117" y="363" text-anchor="middle" class="code">"NYC"</text>

  <text x="180" y="285" class="small">key</text>
  <text x="180" y="303" class="small">value</text>
  <line x1="164" y1="278" x2="155" y2="278" stroke="#868e96" stroke-width="1"/>
  <line x1="164" y1="296" x2="155" y2="296" stroke="#868e96" stroke-width="1"/>
  <text x="45" y="395" class="small">person = {"name": "Ali", ...}</text>

  <!-- SET -->
  <text x="410" y="230" class="struct-title">Set { }</text>
  <text x="410" y="248" class="prop">Unordered, Mutable, No Duplicates</text>

  <!-- Set drawn as scattered circles -->
  <ellipse cx="440" cy="295" rx="32" ry="22" fill="#e8d0ff" stroke="#7950f2" stroke-width="1.5"/>
  <text x="440" y="300" text-anchor="middle" class="code">1</text>
  <ellipse cx="510" cy="280" rx="32" ry="22" fill="#e8d0ff" stroke="#7950f2" stroke-width="1.5"/>
  <text x="510" y="285" text-anchor="middle" class="code">2</text>
  <ellipse cx="580" cy="300" rx="32" ry="22" fill="#e8d0ff" stroke="#7950f2" stroke-width="1.5"/>
  <text x="580" y="305" text-anchor="middle" class="code">3</text>
  <ellipse cx="470" cy="340" rx="32" ry="22" fill="#e8d0ff" stroke="#7950f2" stroke-width="1.5"/>
  <text x="470" y="345" text-anchor="middle" class="code">5</text>
  <ellipse cx="545" cy="350" rx="32" ry="22" fill="#e8d0ff" stroke="#7950f2" stroke-width="1.5"/>
  <text x="545" y="355" text-anchor="middle" class="code">8</text>

  <!-- Strikethrough duplicate -->
  <text x="500" y="395" class="small">No duplicates! {1, 2, 3, 5, 8}</text>

  <!-- Footer -->
  <text x="370" y="432" text-anchor="middle" class="small">Choose the right structure based on: ordering, mutability, and uniqueness needs</text>
</svg>
