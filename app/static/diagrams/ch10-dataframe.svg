<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" style="background:transparent">
  <style>
    text { font-family: 'Segoe Print', 'Comic Sans MS', 'Caveat', cursive; }
    .title { font-size: 20px; font-weight: bold; fill: #1e1e1e; }
    .subtitle { font-size: 14px; font-weight: bold; fill: #495057; }
    .label { font-size: 13px; fill: #1e1e1e; }
    .code { font-family: 'Courier New', monospace; font-size: 12px; fill: #1e1e1e; }
    .val { font-family: 'Courier New', monospace; font-size: 13px; fill: #1e1e1e; }
    .small { font-size: 12px; fill: #666; }
    .header { font-size: 13px; font-weight: bold; fill: #1e1e1e; }
    .idx { font-size: 12px; fill: #868e96; }
    rect.hdr { fill: #228be6; stroke: #1971c2; stroke-width: 1.5; rx: 3; }
    rect.hdr text { fill: white; }
    rect.cell { fill: #e7f5ff; stroke: #74c0fc; stroke-width: 1; rx: 2; }
    rect.idx-cell { fill: #fff3bf; stroke: #fcc419; stroke-width: 1.5; rx: 3; }
    rect.series-box { fill: none; stroke: #e03131; stroke-width: 2; stroke-dasharray: 6 3; rx: 4; }
    line.arrow { stroke: #e03131; stroke-width: 2; fill: none; marker-end: url(#arrDF); }
  </style>
  <defs>
    <marker id="arrDF" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e03131"/>
    </marker>
  </defs>

  <text x="360" y="28" text-anchor="middle" class="title">Pandas DataFrame Structure</text>

  <!-- Column headers -->
  <text x="78" y="62" text-anchor="middle" class="subtitle">Index</text>
  <rect class="hdr" x="140" y="48" width="110" height="28"/>
  <text x="195" y="67" text-anchor="middle" class="header" fill="white">Name</text>
  <rect class="hdr" x="254" y="48" width="80" height="28"/>
  <text x="294" y="67" text-anchor="middle" class="header" fill="white">Age</text>
  <rect class="hdr" x="338" y="48" width="100" height="28"/>
  <text x="388" y="67" text-anchor="middle" class="header" fill="white">City</text>
  <rect class="hdr" x="442" y="48" width="90" height="28"/>
  <text x="487" y="67" text-anchor="middle" class="header" fill="white">Salary</text>

  <!-- Row 0 -->
  <rect class="idx-cell" x="50" y="80" width="60" height="30"/>
  <text x="80" y="100" text-anchor="middle" class="idx">0</text>
  <rect class="cell" x="140" y="80" width="110" height="30"/>
  <text x="195" y="100" text-anchor="middle" class="val">Alice</text>
  <rect class="cell" x="254" y="80" width="80" height="30"/>
  <text x="294" y="100" text-anchor="middle" class="val">28</text>
  <rect class="cell" x="338" y="80" width="100" height="30"/>
  <text x="388" y="100" text-anchor="middle" class="val">New York</text>
  <rect class="cell" x="442" y="80" width="90" height="30"/>
  <text x="487" y="100" text-anchor="middle" class="val">72000</text>

  <!-- Row 1 -->
  <rect class="idx-cell" x="50" y="114" width="60" height="30"/>
  <text x="80" y="134" text-anchor="middle" class="idx">1</text>
  <rect class="cell" x="140" y="114" width="110" height="30"/>
  <text x="195" y="134" text-anchor="middle" class="val">Bob</text>
  <rect class="cell" x="254" y="114" width="80" height="30"/>
  <text x="294" y="134" text-anchor="middle" class="val">34</text>
  <rect class="cell" x="338" y="114" width="100" height="30"/>
  <text x="388" y="134" text-anchor="middle" class="val">Chicago</text>
  <rect class="cell" x="442" y="114" width="90" height="30"/>
  <text x="487" y="134" text-anchor="middle" class="val">85000</text>

  <!-- Row 2 -->
  <rect class="idx-cell" x="50" y="148" width="60" height="30"/>
  <text x="80" y="168" text-anchor="middle" class="idx">2</text>
  <rect class="cell" x="140" y="148" width="110" height="30"/>
  <text x="195" y="168" text-anchor="middle" class="val">Carol</text>
  <rect class="cell" x="254" y="148" width="80" height="30"/>
  <text x="294" y="168" text-anchor="middle" class="val">25</text>
  <rect class="cell" x="338" y="148" width="100" height="30"/>
  <text x="388" y="168" text-anchor="middle" class="val">Boston</text>
  <rect class="cell" x="442" y="148" width="90" height="30"/>
  <text x="487" y="168" text-anchor="middle" class="val">62000</text>

  <!-- Row 3 -->
  <rect class="idx-cell" x="50" y="182" width="60" height="30"/>
  <text x="80" y="202" text-anchor="middle" class="idx">3</text>
  <rect class="cell" x="140" y="182" width="110" height="30"/>
  <text x="195" y="202" text-anchor="middle" class="val">Dave</text>
  <rect class="cell" x="254" y="182" width="80" height="30"/>
  <text x="294" y="202" text-anchor="middle" class="val">31</text>
  <rect class="cell" x="338" y="182" width="100" height="30"/>
  <text x="388" y="202" text-anchor="middle" class="val">Denver</text>
  <rect class="cell" x="442" y="182" width="90" height="30"/>
  <text x="487" y="202" text-anchor="middle" class="val">78000</text>

  <!-- Series highlight -->
  <rect class="series-box" x="252" y="46" width="84" height="170"/>
  <line class="arrow" x1="294" y1="220" x2="294" y2="240"/>
  <text x="294" y="258" text-anchor="middle" class="subtitle">Series</text>
  <text x="294" y="275" text-anchor="middle" class="small">A single column is</text>
  <text x="294" y="290" text-anchor="middle" class="small">a Pandas Series</text>

  <!-- Labels -->
  <text x="580" y="92" class="small">Row = one record</text>
  <line x1="535" y1="95" x2="540" y2="95" stroke="#868e96" stroke-width="1"/>

  <text x="580" y="60" class="small">Column = one feature</text>

  <!-- Annotations -->
  <text x="360" y="330" text-anchor="middle" class="code">df = pd.DataFrame({"Name": [...], "Age": [...], ...})</text>
  <text x="360" y="358" text-anchor="middle" class="small">A DataFrame is a 2D labeled data structure (like a spreadsheet)</text>
  <text x="360" y="378" text-anchor="middle" class="small">Rows = observations, Columns = variables, Index = row labels</text>
</svg>
