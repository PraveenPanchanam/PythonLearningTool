databases:
  - name: pythonlearning-db
    plan: free
    databaseName: pythonlearning
    user: pluser

services:
  - type: web
    name: python-learning-tool
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: FLASK_CONFIG
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pythonlearning-db
          property: connectionString
      - key: FORCE_HTTPS
        value: "true"
      - key: SANDBOX_MODE
        value: subprocess
      - key: SANDBOX_TIMEOUT
        value: "10"
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "8000"
