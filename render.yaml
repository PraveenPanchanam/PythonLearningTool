databases:
  - name: pythonlearning-db
    plan: free
    databaseName: pythonlearning
    user: pluser

services:
  - type: web
    name: python-learning-tool
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: FLASK_CONFIG
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pythonlearning-db
          property: connectionString
      - key: FORCE_HTTPS
        value: "true"
      - key: SANDBOX_MODE
        value: subprocess
      - key: SANDBOX_TIMEOUT
        value: "10"
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "8000"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: BASE_URL
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USE_TLS
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
